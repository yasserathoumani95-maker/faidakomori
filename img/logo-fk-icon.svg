<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Outer white ring -->
  <circle cx="100" cy="100" r="99" fill="white"/>
  <!-- Outer dark green ring border -->
  <circle cx="100" cy="100" r="99" fill="none" stroke="#1a6b2e" stroke-width="4"/>
  <!-- Inner white gap ring -->
  <circle cx="100" cy="100" r="91" fill="white"/>
  <!-- Main green circle fill -->
  <circle cx="100" cy="100" r="84" fill="#1e7a32"/>

  <!-- F letter -->
  <text x="22" y="128"
    font-family="Arial Black, Impact, sans-serif"
    font-weight="900"
    font-size="80"
    fill="white"
    letter-spacing="-2">F</text>

  <!-- K letter vertical stroke -->
  <rect x="104" y="52" width="14" height="90" rx="3" fill="white"/>
  <!-- K top diagonal (white) -->
  <polygon points="118,96  148,52  134,52  104,92  104,100  118,100" fill="white"/>

  <!-- Bar chart replacing K lower diagonal -->
  <!-- Bar 1 dark green -->
  <rect x="119" y="102" width="10" height="28" rx="2" fill="#2d5a1e"/>
  <!-- Bar 2 medium green -->
  <rect x="132" y="88" width="10" height="42" rx="2" fill="#4caf50"/>
  <!-- Bar 3 gold/yellow -->
  <rect x="145" y="76" width="10" height="54" rx="2" fill="#d4a017"/>

  <!-- Arrow shaft exiting circle top-right -->
  <line x1="148" y1="72" x2="174" y2="38"
    stroke="#1a6b2e" stroke-width="5"
    stroke-linecap="round"/>
  <!-- Arrowhead -->
  <polygon points="174,38  160,46  168,55" fill="#1a6b2e"/>
</svg>
