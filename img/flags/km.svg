<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 16" role="img" aria-label="Comores">
  <!-- 4 bandes horizontales : jaune, blanc, rouge, bleu -->
  <rect width="24" height="4" fill="#FCD116"/>
  <rect y="4" width="24" height="4" fill="#FFFFFF"/>
  <rect y="8" width="24" height="4" fill="#CE1126"/>
  <rect y="12" width="24" height="4" fill="#3A75C4"/>

  <!-- Triangle vert côté gauche -->
  <polygon points="0,0 9,8 0,16" fill="#009A44"/>

  <!-- Croissant blanc ouvert vers la droite :
       Grand cercle blanc masqué par un cercle vert décalé à droite.
       Les deux hornes du croissant pointent vers la droite. -->
  <circle cx="4"   cy="8" r="2.6" fill="#FFFFFF"/>
  <circle cx="5.2" cy="8" r="2.1" fill="#009A44"/>

  <!-- 4 étoiles blanches DANS la concavité du croissant
       (entre les deux cornes, côté droit de l'arc) -->
  <circle cx="5.7" cy="6.2" r="0.52" fill="#FFFFFF"/>
  <circle cx="5.7" cy="7.4" r="0.52" fill="#FFFFFF"/>
  <circle cx="5.7" cy="8.6" r="0.52" fill="#FFFFFF"/>
  <circle cx="5.7" cy="9.8" r="0.52" fill="#FFFFFF"/>
</svg>
