<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" width="400" height="260">
  <!-- Icon (centered above text) -->
  <g transform="translate(100, 0) scale(1)">
    <!-- Outer white ring -->
    <circle cx="100" cy="100" r="99" fill="white"/>
    <circle cx="100" cy="100" r="99" fill="none" stroke="#1a6b2e" stroke-width="4"/>
    <circle cx="100" cy="100" r="91" fill="white"/>
    <circle cx="100" cy="100" r="84" fill="#1e7a32"/>
    <!-- F -->
    <text x="22" y="128"
      font-family="Arial Black, Impact, sans-serif"
      font-weight="900" font-size="80"
      fill="white" letter-spacing="-2">F</text>
    <!-- K vertical -->
    <rect x="104" y="52" width="14" height="90" rx="3" fill="white"/>
    <!-- K top diagonal -->
    <polygon points="118,96 148,52 134,52 104,92 104,100 118,100" fill="white"/>
    <!-- Bars -->
    <rect x="119" y="102" width="10" height="28" rx="2" fill="#2d5a1e"/>
    <rect x="132" y="88" width="10" height="42" rx="2" fill="#4caf50"/>
    <rect x="145" y="76" width="10" height="54" rx="2" fill="#d4a017"/>
    <!-- Arrow -->
    <line x1="148" y1="72" x2="174" y2="38" stroke="#1a6b2e" stroke-width="5" stroke-linecap="round"/>
    <polygon points="174,38 160,46 168,55" fill="#1a6b2e"/>
  </g>

  <!-- FaidaKomori wordmark -->
  <text x="200" y="222"
    font-family="Georgia, 'Times New Roman', serif"
    font-weight="700"
    font-size="44"
    fill="#0D2244"
    text-anchor="middle"
    letter-spacing="-1">FaidaKomori</text>

  <!-- Slogan -->
  <text x="200" y="250"
    font-family="Arial, sans-serif"
    font-weight="400"
    font-size="16"
    fill="#6B7280"
    text-anchor="middle"
    letter-spacing="0.3">Financez votre projet. Ensemble.</text>
</svg>
